name: Build & release Achivo Agent

# Пуш тега виду agent-v1.2.3 -> CI збирає агент і публікує AchivoAgent.zip
# у GitHub Release. Локальний gh/автентифікація не потрібні — Actions робить
# усе своїм GITHUB_TOKEN.
on:
  push:
    tags:
      - "agent-v*"
  # Дозволяє запустити вручну з вкладки Actions (без публікації релізу).
  workflow_dispatch:

permissions:
  contents: write # потрібно, щоб створити реліз і завантажити ассет

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & assemble AchivoAgent.zip
        shell: pwsh
        run: ./SteamAchievementManager-master/SAM.Agent/build-dist.ps1

      - name: Upload artifact (для ручних запусків)
        uses: actions/upload-artifact@v4
        with:
          name: AchivoAgent
          path: SteamAchievementManager-master/SAM.Agent/dist/AchivoAgent.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          # Вбудований gh (офіційний, уже на runner-і) замість стороннього
          # action — прибирає supply-chain ризик. Публікуємо zip + SHA-256,
          # щоб завантажувачі могли перевірити цілісність.
          GH_TOKEN: ${{ github.token }}
        run: |
          $zip = "SteamAchievementManager-master/SAM.Agent/dist/AchivoAgent.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  AchivoAgent.zip" | Out-File -Encoding ascii "$zip.sha256"
          gh release create $env:GITHUB_REF_NAME `
            $zip "$zip.sha256" `
            --title "Achivo Agent $env:GITHUB_REF_NAME" `
            --notes "Local unlock agent for Windows.`n`nSHA-256 (AchivoAgent.zip): ``$hash``"
